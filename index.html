<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIG² - Sistema Integrado de Gente e Gestão</title>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const errInfo = {
        message: message,
        source: source,
        lineno: lineno,
        colno: colno,
        stack: error ? error.stack : ''
      };
      fetch('/log-error', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(errInfo)
      });
    };
    window.onunhandledrejection = function(event) {
      const errInfo = {
        message: 'Unhandled Promise Rejection: ' + event.reason,
        stack: event.reason && event.reason.stack ? event.reason.stack : ''
      };
      fetch('/log-error', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(errInfo)
      });
    };
  </script>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mag: {
              dark: '#0A1D37',
              light: '#0284C7'
            }
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body class="h-screen overflow-hidden flex flex-col md:flex-row">

  <!-- Left Sidebar (Sidebar Component mounts here) -->
  <div id="sidebar-container" class="h-full shrink-0 flex-col print-hide">
    <!-- Dynamic Sidebar -->
  </div>

  <!-- Main Workspace -->
  <div id="main-content" class="flex-1 flex flex-col overflow-y-auto bg-slate-50">
    
    <!-- Header (Header Component mounts here) -->
    <div id="header-container" class="shrink-0 sticky top-0 z-40">
      <!-- Dynamic Header -->
    </div>

    <!-- Page Workspace Container -->
    <main id="dashboard-workspace" class="flex-1 p-6 space-y-6 w-full">
      <!-- Render dynamic components here -->
      <div class="flex items-center justify-center p-12 text-slate-400 bg-white border border-slate-200 rounded-xl shadow-sm h-64 animate-pulse">
        <p class="text-sm font-semibold">Carregando dados da liderança...</p>
      </div>
    </main>
    
  </div>

  <!-- Modal for Dimension Details -->
  <div id="dimension-modal" class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl border border-slate-200 w-full max-w-lg overflow-hidden transform scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[90vh]" id="dimension-modal-content">
      <!-- Content will be injected dynamically -->
    </div>
  </div>

  <!-- App Logic -->
  <script type="module" src="./src/app.js"></script>
</body>
</html>
